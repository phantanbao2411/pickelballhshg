<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw4gYWD_LK8O4h0Kcl6i12iUgK-ryN0jadt5uZU0wW2JVyMiYaPh2lkrbzzEyC449_tkA/exec";

// ===== SAVE =====
function saveScore(p1, p2, s1, s2) {
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ p1, p2, s1, s2 })
    });
}

// ===== LOAD =====
async function loadData() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        document.querySelectorAll('tbody tr[data-p1]').forEach(row => {
            const p1 = row.getAttribute('data-p1');
            const p2 = row.getAttribute('data-p2');

            const found = data.find(r => r[1] == p1 && r[2] == p2);

            if (found) {
                row.querySelector('.p1-score').value = found[3];
                row.querySelector('.p2-score').value = found[4];
            }
        });

        updateStandings();
    } catch (err) {
        console.log("Load lỗi:", err);
    }
}

// ===== EVENT INPUT =====
document.querySelectorAll('tbody tr[data-p1]').forEach(row => {
    const inputs = row.querySelectorAll('.score-input');

    inputs.forEach(input => {
        input.addEventListener('change', () => {
            const s1 = inputs[0].value;
            const s2 = inputs[1].value;

            if (s1 !== "" && s2 !== "") {
                const p1 = row.getAttribute('data-p1');
                const p2 = row.getAttribute('data-p2');

                saveScore(p1, p2, s1, s2);
                updateStandings();
            }
        });
    });
});

// ===== AUTO SYNC (giả realtime) =====
setInterval(loadData, 3000);

// ===== LOAD LẦN ĐẦU =====
loadData();
</script>
