<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSHG Pickleball</title>
</head>

<body>

<h2>Nhập tỷ số</h2>

<table border="1">
<tr>
<td>Match 1</td>
<td><input type="number" class="p1-score"></td>
<td><input type="number" class="p2-score"></td>
</tr>
<tr>
<td>Match 2</td>
<td><input type="number" class="p1-score"></td>
<td><input type="number" class="p2-score"></td>
</tr>
</table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwqX-DPXJf8a8pcO32FNutVMRNV-EEyDsMaUvv7aZq3oOAKWv_QKZjy2i2xNMp54RssKA/exec";

// Lưu dữ liệu
function saveScore(match, s1, s2) {
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            match: match,
            p1: "A",
            p2: "B",
            s1: s1,
            s2: s2
        })
    });
}

// Load dữ liệu
async function loadData() {
    const res = await fetch(API_URL);
    const data = await res.json();

    data.slice(1).forEach((row, index) => {
        const rows = document.querySelectorAll("tr");

        if (rows[index + 1]) {
            rows[index + 1].querySelector(".p1-score").value = row[3];
            rows[index + 1].querySelector(".p2-score").value = row[4];
        }
    });
}

// Gắn sự kiện input
document.querySelectorAll("tr").forEach((row, index) => {
    const inputs = row.querySelectorAll("input");

    if (inputs.length === 2) {
        inputs.forEach(input => {
            input.addEventListener("change", () => {
                const s1 = inputs[0].value;
                const s2 = inputs[1].value;

                if (s1 !== "" && s2 !== "") {
                    saveScore(index, s1, s2);
                }
            });
        });
    }
});

// Load khi mở web
loadData();
</script>

</body>
</html>
