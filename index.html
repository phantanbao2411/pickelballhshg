<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwqX-DPXJf8a8pcO32FNutVMRNV-EEyDsMaUvv7aZq3oOAKWv_QKZjy2i2xNMp54RssKA/exec";

// Lưu theo match (không trùng)
function saveScore(match, p1, p2, s1, s2) {
    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ match, p1, p2, s1, s2 })
    });
}

// Load dữ liệu từ Google Sheet
async function loadData() {
    const res = await fetch(API_URL);
    const data = await res.json();

    data.slice(1).forEach(row => {
        const matchIndex = row[0] - 1;
        const matchRow = document.querySelectorAll('tbody tr[data-p1]')[matchIndex];

        if (matchRow) {
            matchRow.querySelector('.p1-score').value = row[3];
            matchRow.querySelector('.p2-score').value = row[4];
        }
    });

    updateStandings();
}

// Gắn sự kiện input
document.querySelectorAll('tbody tr[data-p1]').forEach((row, index) => {
    const inputs = row.querySelectorAll('.score-input');

    inputs.forEach(input => {
        input.addEventListener('change', () => {
            const s1 = inputs[0].value;
            const s2 = inputs[1].value;

            if (s1 !== "" && s2 !== "") {
                const p1 = row.getAttribute('data-p1');
                const p2 = row.getAttribute('data-p2');

                saveScore(index + 1, p1, p2, s1, s2);
                updateStandings();
            }
        });
    });
});

// Auto refresh mỗi 5 giây (giả realtime)
setInterval(loadData, 5000);

// Load lần đầu
loadData();
</script>
